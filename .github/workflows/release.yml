name: Release

# Déclenché quand un tag du type v1.0.1 est poussé sur GitHub
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write   # requis pour créer des Releases GitHub et uploader des assets

jobs:
  build:
    name: Build & attach presellia-partner-bridge.zip
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le dépôt au commit taggé
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Extrait le numéro de version du tag (supprime le "v" préfixe)
      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 3. Construit le ZIP avec le bon nom de dossier "presellia-partner-bridge/"
      #    Exclut les fichiers de développement pour un ZIP propre production.
      - name: Build presellia-partner-bridge.zip
        run: |
          mkdir -p /tmp/build/presellia-partner-bridge
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.zip' \
            --exclude='node_modules' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*.log' \
            . /tmp/build/presellia-partner-bridge/
          cd /tmp/build
          zip -r presellia-partner-bridge.zip presellia-partner-bridge/
          echo "ZIP créé : $(du -sh presellia-partner-bridge.zip | cut -f1)"

      # 4. Crée la Release GitHub et attache le ZIP
      - name: Create Release & upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Presellia Partner Bridge v${{ steps.version.outputs.version }}"
          body: |
            ## Presellia Partner Bridge v${{ steps.version.outputs.version }}

            **Installation / Mise à jour :**
            - Depuis votre tableau de bord WordPress : *WooCommerce → PPB Réglages → Mise à jour du plugin → Vérifier maintenant*
            - Ou via *Tableau de bord → Mises à jour* (vérification automatique toutes les 12 h)
            - Ou téléchargez `presellia-partner-bridge.zip` ci-dessous et installez-le manuellement via *Extensions → Ajouter → Téléverser*.
          files: /tmp/build/presellia-partner-bridge.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
